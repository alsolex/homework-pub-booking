<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Event at Haymarket Tap</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 2em auto; padding: 1em; border: 2px solid #333; }
    h1   { color: #222; }
    dl   { display: grid; grid-template-columns: max-content auto; gap: .4em 1em; }
    dt   { font-weight: bold; }
    dd   { margin: 0; }
  </style>
</head>
<body>
<h1>Private Event at <span data-testid="venue_name">Haymarket Tap</span></h1>
<dl>
  <dt>Address</dt>    <dd data-testid="venue_address">12 Dalry Rd, Edinburgh EH11 2BG</dd>
  <dt>Date</dt>       <dd data-testid="date">2026-04-25</dd>
  <dt>Time</dt>       <dd data-testid="time">19:30</dd>
  <dt>Party size</dt> <dd data-testid="party_size">6</dd>
  <dt>Weather</dt>    <dd data-testid="condition">cloudy,
                          <span data-testid="temperature_c">12</span>°C</dd>
  <dt>Total cost</dt> <dd data-testid="total"><strong>£556</strong></dd>
  <dt>Deposit</dt>    <dd data-testid="deposit">£111</dd>
</dl>
</body>
</html>
